version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: qr_exam_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-examadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exampassword123}
      POSTGRES_DB: ${POSTGRES_DB:-qr_exam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examadmin -d qr_exam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: qr_exam_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
